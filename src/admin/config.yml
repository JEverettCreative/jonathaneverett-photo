backend:
  name: git-gateway
  branch: main

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "src/blog/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    folder: "src/_data/gallery"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["physique", "headshots", "portraits", "creative"] }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/_data/testimonials"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Service Type", name: "service", widget: "select", options: ["physique", "headshots", "portraits", "creative", "film"] }
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "src/_data/homepage.json"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Tagline", name: "heroTagline", widget: "string" }
          - { label: "Hero Description", name: "heroDescription", widget: "text" }
          - { label: "Featured Work Title", name: "featuredWorkTitle", widget: "string" }
          - { label: "Featured Work Subtitle", name: "featuredWorkSubtitle", widget: "string" }
          - { label: "Mid-Section Text", name: "midSectionText", widget: "text" }
          - { label: "CTA Title", name: "ctaTitle", widget: "string" }
          - { label: "CTA Text", name: "ctaText", widget: "string" }
      - label: "About Page"
        name: "about"
        file: "src/_data/about.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Bio Paragraphs", name: "bio", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
      - label: "Physique FAQ"
        name: "physique_faq"
        file: "src/_data/physiqueFaq.json"
        fields:
          - label: "FAQ Items"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
